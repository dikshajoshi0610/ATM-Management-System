<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATM System</title>
  <style>
    body {
      display: flex;
      justify-content: center;   
      align-items: center;       
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
    }

    .atm-box {
      border: 2px solid var(--table-border);
      padding: 20px;
      text-align: center;
      background-color: #fff;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      border-radius: 8px;
    }
    .atm-box .atm-box {
      border: 2px solid var(--box-border);
    }
    :root {
      --bg: #f0f0f0;
      --text: #000000;
      --card-bg: #ffffff;
      --border: #000000;
      --button-border: #000000;
      --button-bg: #e0e0e0;
      --button-text: #000000;
      --button-hover: #c0c0c0;
      --primary: #007bff;
      --primary-hover: #0056b3;
      --success: #28a745;
      --success-hover: #218838;
      --muted: #6c757d;
      --muted-hover: #444444;
      --table-header: #004080;
      --table-header-text: #ffffff;
      --table-row-even: #f2f2f2;
      --table-row-odd: #ffffff;
      --table-border: #000000;
      --box-border: #000000;
      --button-border: #000000;
    }
    .dark-mode {
      --bg: #121212;
      --text: #f0f0f0;
      --card-bg: #1e1e1e;
      --border: #444444;
      --button-bg: #333333;
      --button-text: #ffffff;
      --button-hover: #555555;
      --primary: #5b9cff;
      --primary-hover: #4077e0;
      --success: #43c475;
      --success-hover: #2fa853;
      --muted: #777777;
      --muted-hover: #999999;
      --table-header: #295b98;
      --table-header-text: #ffffff;
      --table-row-even: #232f3f;
      --table-row-odd: #1b2430;
      --table-border: #1cedd1;
      --box-border: #2ed2ff;
      --button-border: #ff2ee0;
    }
    body {
      background-color: var(--bg);
      color: var(--text);
      transition: background-color 0.3s, color 0.3s;
    }
    .card, .atm-box {
      background-color: var(--card-bg);
      color: var(--text);
    }
    .atm-box {
      border-color: var(--table-border);
    }
    .atm-box, .card {
      box-shadow: 0 0 10px rgba(0,0,0,0.15);
    }
    button, .btn, .back-btn, .menu-btn {
      color: var(--button-text);
      border-color: var(--button-border);
    }
    button, .btn {
      background-color: var(--button-bg);
    }
    button:hover, .btn:hover {
      background-color: var(--button-hover);
    }
    .back-btn, .menu-btn {
      background-color: var(--muted);
    }
    .back-btn:hover, .menu-btn:hover {
      background-color: var(--muted-hover);
    }
    th {
      background-color: var(--table-header);
      color: var(--table-header-text);
    }
    tr:nth-child(even) {
      background-color: var(--table-row-even);
    }
    tr:nth-child(odd) {
      background-color: var(--table-row-odd);
    }
    table, th, td {
      border-color: var(--table-border);
    }
    .switch {
      position: absolute;
      top: 20px;
      right: 20px;
      display: inline-block;
      width: 60px;
      height: 30px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #EA3680;
      transition: 0.4s;
      border-radius: 30px;
    }
    .slider:before {
      content: "🌙";
      position: absolute;
      left: 8px;
      bottom: 4px;
      font-size: 16px;
      transition: 0.4s;
    }
    input:checked + .slider {
      background-color: #216370;
    }
    input:checked + .slider:before {
      transform: translateX(30px);
    }

    .atm-box h2 {
      margin-bottom: 20px;
      font-weight: bold;
    }

    .atm-box button {
      display: block;           
      width: 200px;             
      margin: 10px auto;        
      padding: 10px;
      font-size: 16px;
      cursor: pointer;
      border: 1px solid var(--button-border);
      background-color: var(--button-bg);
      color: var(--button-text);
      transition: background-color 0.3s;
      border-radius: 5px;
    }

    .atm-box button:hover {
      background-color: #c0c0c0;
    }
  </style>
</head>
<body>
  <label class="switch">
    <input type="checkbox" id="toggleSwitch">
    <span class="slider"></span>
  </label>
  <div class="atm-box">
    <h2>WELCOME TO ATM SYSTEM</h2>
    <div class="atm-box">
  <button onclick="location.href='balance'">Check Balance</button>
  <button onclick="location.href='withdraw.html'">Withdraw Cash</button>
  <button onclick="location.href='deposit.html'">Deposit Cash</button>
  <button onclick="location.href='miniStatement'">Mini Statement</button>
  <button onclick="location.href='change-pin.html'">Change PIN</button>
  <button onclick="location.href='logout'">Logout</button>
</div>
  </div>
  <script>
    const toggleSwitch = document.getElementById('toggleSwitch');
    const themeKey = 'atm-dark-mode';
    const applyTheme = (darkMode) => {
      document.body.classList.toggle('dark-mode', darkMode);
      if (toggleSwitch) {
        toggleSwitch.checked = darkMode;
      }
    };
    const saved = localStorage.getItem(themeKey);
    applyTheme(saved === '1');
    if (toggleSwitch) {
      toggleSwitch.addEventListener('change', () => {
        const isDark = toggleSwitch.checked;
        applyTheme(isDark);
        localStorage.setItem(themeKey, isDark ? '1' : '0');
      });
    }
  </script>
</body>
</html>
